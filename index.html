<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Sports</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon fill='orange' points='50,10 61,40 94,40 68,60 78,90 50,70 22,90 32,60 6,40 39,40'/></svg>">    <style>
        :root {
            --bg-dark: #0a0e27;
            --accent: #00ff9f;
            --card-bg: rgba(20, 25, 45, 0.9);
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            color: var(--accent);
            text-shadow: 0 0 20px rgba(0, 255, 159, 0.5);
            margin: 0;
            font-size: 2.5rem;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1200px;
            padding: 20px;
        }

        .channel-card {
            background: var(--card-bg);
            border: 2px solid rgba(0, 255, 159, 0.2);
            border-radius: 15px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .channel-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(0, 255, 159, 0.2);
        }

        .logo-box {
            width: 100%;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .logo-box img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }

        .channel-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .live-badge {
            background: #ff4757;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.8rem; }
            .grid-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Star Sports</h1>
        <p>Premium Star Sports Hindi Channels</p>
    </div>

    <div class="grid-container">
        
        <a href="https://starsportslive1.vercel.app/" class="channel-card" target="_blank">
            <div class="logo-box">
                <img src="https://github.com/VGLive/SS1H/blob/main/1.png?raw=true" alt="Star Sports 1 Hindi HD">
            </div>
            <div class="channel-name">Star Sports 1 Hindi HD</div>
            <div class="live-badge">Live</div>
        </a>

        <a href="https://starsportslive2.vercel.app/" class="channel-card" target="_blank">
            <div class="logo-box">
                <img src="https://github.com/VGLive/SS2H/blob/main/2.png?raw=true" alt="Star Sports 2 Hindi HD">
            </div>
            <div class="channel-name">Star Sports 2 Hindi HD</div>
            <div class="live-badge">Live</div>
        </a>

        <a href="https://starsportslive3.vercel.app/" class="channel-card" target="_blank">
            <div class="logo-box">
                <img src="https://github.com/VGLive/SS1/blob/main/1.png?raw=true" alt="Star Sports 1 HD">
            </div>
            <div class="channel-name">Star Sports 1 Hindi</div>
            <div class="live-badge">Live</div>
        </a>

        <a href="https://starsportslive4.vercel.app/" class="channel-card" target="_blank">
            <div class="logo-box">
                <img src="https://github.com/VGLive/SS2/blob/main/2.png?raw=true" alt="Star Sports 2 HD">
            </div>
            <div class="channel-name">Star Sports 2 Hindi</div>
            <div class="live-badge">Live</div>
        </a>

    </div>

</body>
</html>
